kind = "web"
previewPath = "/"
title = "NutriSafe Dashboard"
version = "1.0.0"
id = "artifacts/nutrisafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24285

[services.development]
run = "pnpm --filter @workspace/nutrisafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutrisafe", "run", "build" ]
publicDir = "artifacts/nutrisafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24285"
BASE_PATH = "/"
